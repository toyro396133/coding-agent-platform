name: PR Agent

on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run pr agent
    steps:
      - name: PR Agent action
        uses: Codium-ai/pr-agent@main
        env:
          # הגדרת ספק המודל לגוגל
          config.model_provider: "google"
          # הגדרת המודל הספציפי לביצועים ומהירות
          config.model: "gemini/gemini-3.5-flash" 
          # משתנה הסביבה הרשמי של הכלי עבור מפתח Google AI Studio
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
